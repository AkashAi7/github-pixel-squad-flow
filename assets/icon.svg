<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2230"/>
      <stop offset="100%" stop-color="#10161f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>
  <!-- Grid floor -->
  <line x1="0" y1="100" x2="128" y2="100" stroke="rgba(245,239,225,0.06)" stroke-width="1"/>
  <line x1="0" y1="82" x2="128" y2="82" stroke="rgba(245,239,225,0.04)" stroke-width="1"/>
  <!-- Agent 1 — Copilot (yellow/gold) -->
  <rect x="18" y="38" width="24" height="7" rx="1" fill="#ffe066"/><!-- hat -->
  <rect x="20" y="45" width="20" height="18" rx="1" fill="#f5efe1"/><!-- head -->
  <rect x="25" y="51" width="4" height="4" fill="#10161f"/><!-- left eye -->
  <rect x="33" y="51" width="4" height="4" fill="#10161f"/><!-- right eye -->
  <rect x="28" y="58" width="6" height="2" rx="1" fill="#10161f"/><!-- mouth -->
  <rect x="17" y="63" width="26" height="20" rx="1" fill="#ffe066"/><!-- body -->
  <rect x="22" y="69" width="16" height="4" rx="1" fill="rgba(255,255,255,0.2)"/><!-- stripe -->
  <rect x="22" y="83" width="7" height="12" fill="#37474f"/><!-- left leg -->
  <rect x="33" y="83" width="7" height="12" fill="#37474f"/><!-- right leg -->
  <!-- Lightning bolt on body -->
  <polygon points="28,65 33,65 31,70 35,70 27,79 29,73 25,73" fill="#10161f" opacity="0.3"/>
  <!-- Agent 2 — Claude (purple) -->
  <rect x="52" y="42" width="24" height="7" rx="1" fill="#ce93d8"/><!-- hat -->
  <rect x="54" y="49" width="20" height="18" rx="1" fill="#f5efe1"/><!-- head -->
  <rect x="59" y="55" width="4" height="4" fill="#10161f"/><!-- left eye -->
  <rect x="67" y="55" width="4" height="4" fill="#10161f"/><!-- right eye -->
  <rect x="62" y="62" width="4" height="2" rx="1" fill="#10161f"/><!-- mouth -->
  <rect x="51" y="67" width="26" height="20" rx="1" fill="#ce93d8"/><!-- body -->
  <rect x="56" y="73" width="16" height="4" rx="1" fill="rgba(255,255,255,0.2)"/><!-- stripe -->
  <rect x="56" y="87" width="7" height="12" fill="#5d4037"/><!-- left leg -->
  <rect x="67" y="87" width="7" height="12" fill="#5d4037"/><!-- right leg -->
  <!-- Brain icon on body -->
  <circle cx="64" cy="73" r="3" fill="rgba(255,255,255,0.15)"/>
  <!-- Agent 3 — Teal (tester/devops) -->
  <rect x="86" y="46" width="24" height="7" rx="1" fill="#70c1b3"/><!-- hat -->
  <rect x="88" y="53" width="20" height="18" rx="1" fill="#f5efe1"/><!-- head -->
  <rect x="93" y="59" width="4" height="4" fill="#10161f"/><!-- left eye -->
  <rect x="101" y="59" width="4" height="4" fill="#10161f"/><!-- right eye -->
  <rect x="96" y="66" width="4" height="2" rx="1" fill="#10161f"/><!-- mouth -->
  <rect x="85" y="71" width="26" height="20" rx="1" fill="#70c1b3"/><!-- body -->
  <rect x="90" y="77" width="16" height="4" rx="1" fill="rgba(255,255,255,0.2)"/><!-- stripe -->
  <rect x="90" y="91" width="7" height="8" fill="#37474f"/><!-- left leg -->
  <rect x="101" y="91" width="7" height="8" fill="#37474f"/><!-- right leg -->
  <!-- Title bar accent -->
  <rect x="14" y="108" width="100" height="3" rx="1.5" fill="#ffe066" opacity="0.5"/>
  <!-- "PS" text -->
  <text x="64" y="122" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="rgba(245,239,225,0.4)" letter-spacing="3">PIXEL SQUAD</text>
</svg>